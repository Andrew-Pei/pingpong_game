<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人乒乓球对战</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #222;
            user-select: none;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        /* 球桌样式 */
        #table {
            position: absolute;
            width: 80%;
            height: 70%;
            background-color: #005500;
            border: 10px solid #FFF;
            border-radius: 5px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            box-sizing: border-box; 
        }
        
        #net {
            position: absolute;
            width: 10px; 
            height: 104%;
            background-color: #EEE;
            left: 50%;
            top: -2%;
            transform: translateX(-50%);
            box-shadow: 2px 0 5px rgba(0,0,0,0.3);
            z-index: 2;
        }

        #table::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            top: 50%;
            left: 0;
        }
        
        .player {
            position: absolute;
            width: 80px;  
            height: 80px; 
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%; 
            border: 3px solid #fff; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            z-index: 10;
            transition: transform 0.05s;
            box-sizing: border-box; 
        }

        #player1 {
            background-image: url('学生头像1.jpg');
        }
        
        #player2 {
            background-image: url('国乒头像1.jpg');
        }
        
        #ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #ffcc00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            display: none;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
        }
        
        #main-title {
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #FFD700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 16;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main-title img {
            height: 35px;
            margin-right: 10px;
        }

        #score {
            position: absolute;
            top: 45px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 50px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 15;
            pointer-events: none;
        }

        #score .score-label {
            color: #ccc;
            font-size: 40px;
            margin: 0 5px;
        }
        
        #score .score-p1 {
            color: #4CAF50;
        }
        
        #score .score-p2 {
            color: #FF5722;
        }
        
        #score .score-separator {
            color: white;
            margin: 0 5px;
        }
        
        #score .games,
        #score .points {
            display: inline-block;
            margin: 0 10px;
        }

        #status-msg {
            position: absolute;
            top: 35%;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ff3333;
            font-size: 60px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #fff;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s;
            z-index: 18;
            pointer-events: none;
        }

        #status-msg.show {
            opacity: 1;
            transform: scale(1.2);
        }

        /* 发球提示信息样式 */
        #serve-msg {
            position: absolute;
            top: 60%;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffff00;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            z-index: 18;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s; 
        }

        #serve-msg.show {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 16px;
            z-index: 15;
            pointer-events: none;
        }
        
        .control-group {
            display: inline-block;
            margin: 0 40px;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .key {
            display: inline-block;
            background: #fff;
            color: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-family: monospace;
            margin: 0 2px;
        }

        #start-screen, #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 20;
            overflow-y: auto;
            padding: 20px 10px;
        }

        #game-over { display: none; }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 12px 30px;
            font-size: 20px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button.mode-pve {
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        
        /* 头像选择样式 */
        .avatar-option {
            text-align: center;
            transition: all 0.2s ease;
        }
        
        .avatar-option:hover {
            transform: scale(1.05);
        }
        
        .avatar-option.selected img {
            border-width: 5px !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        .avatar-option[data-player="1"].selected img {
            border-color: #4CAF50 !important;
        }
        
        .avatar-option[data-player="2"].selected img {
            border-color: #FF5722 !important;
        }
        
        /* 头像选择样式 */
        .avatar-option {
            text-align: center;
            transition: all 0.2s ease;
        }
        
        .avatar-option:hover {
            transform: scale(1.05);
        }
        
        .avatar-option.selected img {
            border-width: 5px !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        .avatar-option[data-player="1"].selected img {
            border-color: #4CAF50 !important;
        }
        
        .avatar-option[data-player="2"].selected img {
            border-color: #FF5722 !important;
        }
        
        /* 触控控制样式 */
        #touch-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 15;
            pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }
        
        .touch-control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }
        
        .touch-control-label {
            color: white;
            font-size: 14px;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            opacity: 0.8;
        }
        
        .touch-direction-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            width: 120px;
            height: 120px;
        }
        
        .touch-button {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .touch-button:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .touch-button:active {
            background-color: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }
        
        .touch-button.up {
            grid-column: 2;
            grid-row: 1;
        }
        
        .touch-button.down {
            grid-column: 2;
            grid-row: 3;
        }
        
        .touch-button.left {
            grid-column: 1;
            grid-row: 2;
        }
        
        .touch-button.right {
            grid-column: 3;
            grid-row: 2;
        }
        
        .touch-button.center {
            grid-column: 2;
            grid-row: 2;
            background-color: rgba(76, 175, 80, 0.3);
            border-color: rgba(76, 175, 80, 0.6);
        }
        
        .touch-button.center:active {
            background-color: rgba(76, 175, 80, 0.5);
        }
        
        #serve-touch-button {
            width: 140px;
            height: 50px;
            background-color: rgba(255, 193, 7, 0.3);
            border-color: rgba(255, 193, 7, 0.6);
            border-radius: 25px;
            font-size: 16px;
            text-align: center;
            padding: 8px;
            line-height: 1.2;
        }
        
        #serve-touch-button:active {
            background-color: rgba(255, 193, 7, 0.5);
        }
        
        #serve-touch-button.active {
            background-color: rgba(255, 193, 7, 0.7);
            border-color: rgba(255, 193, 7, 1);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.5);
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .touch-direction-buttons {
                width: 120px;
                height: 120px;
            }
            
            #serve-touch-button {
                width: 100px;
                height: 100px;
            }
            
            .touch-button {
                font-size: 20px;
            }
            
            .touch-control-label {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="main-title"><img src="校徽.png" alt="校徽">重庆八中AI-Coding" 一'乒'到底"挑战赛</div>
        <div id="score">
    <span class="score-label">局数:</span>
    <span class="games">
        <span class="score-p1">0</span>
        <span class="score-separator">-</span>
        <span class="score-p2">0</span>
    </span>
    <span class="score-separator"> | </span>
    <span class="score-label">比分:</span>
    <span class="points">
        <span class="score-p1">0</span>
        <span class="score-separator">-</span>
        <span class="score-p2">0</span>
    </span>
</div>
        <div id="status-msg">出界</div>
        <div id="serve-msg">按 空格键 发球</div>

        <div id="table">
            <div id="net"></div>
        </div>
        
        <div id="player1" class="player"></div>
        <div id="player2" class="player"></div>
        <div id="ball"></div>
        
        <!-- 触控控制界面 -->
        <div id="touch-controls">
            <!-- 玩家1方向控制 -->
            <div class="touch-control-group">
                <div class="touch-control-label">八中队 方向控制</div>
                <div class="touch-direction-buttons">
                    <div class="touch-button up" data-action="p1-up">↑</div>
                    <div class="touch-button down" data-action="p1-down">↓</div>
                    <div class="touch-button left" data-action="p1-left">←</div>
                    <div class="touch-button right" data-action="p1-right">→</div>
                    <div class="touch-button center" data-action="p1-stop">●</div>
                </div>
            </div>
            
            <!-- 发球按钮 -->
            <div class="touch-control-group">
                <div class="touch-control-label">发球控制</div>
                <div id="serve-touch-button" class="touch-button">点击发球</div>
            </div>
            
            <!-- 玩家2方向控制 -->
            <div class="touch-control-group">
                <div class="touch-control-label">国乒队 方向控制</div>
                <div class="touch-direction-buttons">
                    <div class="touch-button up" data-action="p2-up">↑</div>
                    <div class="touch-button down" data-action="p2-down">↓</div>
                    <div class="touch-button left" data-action="p2-left">←</div>
                    <div class="touch-button right" data-action="p2-right">→</div>
                    <div class="touch-button center" data-action="p2-stop">●</div>
                </div>
            </div>
        </div>
        
        <div id="controls">
            <div class="control-group">
                <div style="margin-bottom:5px; color:#aaa;">八中队</div>
                <span class="key">W</span><span class="key">S</span><span class="key">A</span><span class="key">D</span>
            </div>
            <div class="control-group" id="p2-controls">
                <div style="margin-bottom:5px; color:#aaa;">国乒队</div>
                <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
            </div>
        </div>
        
        <div id="start-screen">
            <h1 style="color:white; font-size: 30px; margin-bottom:6px;">乒乓球对战</h1>
            <p style="color: #bbb; font-size: 14px; margin-bottom: 2px;">⚠️ 注意：当心乒乓球飞出球桌边缘！！！</p>
            <p style="color: #bbb; font-size: 14px; margin-bottom: 2px;">⚠️ 规则：双方不能越过中线网。</p>
            <p style="color: #bbb; font-size: 14px; margin-bottom: 6px;">如果不小心在己方区域把球打出上下边界，对方得分。</p>
            
            <!-- 头像选择区域 -->
            <div id="avatar-selection" style="margin: 5px 0; color: white;">
                <div style="margin-bottom: 10px;">
                    <h3 style="color: #4CAF50; font-size: 14px; margin-bottom: 4px;">学生选手头像选择</h3>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <div class="avatar-option" data-player="1" data-avatar="学生头像1.jpg">
                            <img src="学生头像1.jpg" alt="学生头像1" style="width: 60px; height: 60px; border-radius: 10px; border: 2px solid #4CAF50; cursor: pointer;">
                        </div>
                        <div class="avatar-option" data-player="1" data-avatar="学生头像2.jpg">
                            <img src="学生头像2.jpg" alt="学生头像2" style="width: 60px; height: 60px; border-radius: 10px; border: 2px solid #4CAF50; cursor: pointer;">
                        </div>
                    </div>
                </div>
                
                <div>
                    <h3 style="color: #FF5722; font-size: 14px; margin-bottom: 4px;">国乒选手头像选择</h3>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <div class="avatar-option" data-player="2" data-avatar="国乒头像1.jpg">
                            <img src="国乒头像1.jpg" alt="国乒头像1" style="width: 60px; height: 60px; border-radius: 10px; border: 2px solid #FF5722; cursor: pointer;">
                        </div>
                        <div class="avatar-option" data-player="2" data-avatar="国乒头像2.jpg">
                            <img src="国乒头像2.jpg" alt="国乒头像2" style="width: 60px; height: 60px; border-radius: 10px; border: 2px solid #FF5722; cursor: pointer;">
                        </div>
                    </div>
                </div>
                
                
            </div>
            
            <div class="btn-group">
                <button id="start-pvp">双人对战</button>
                <button id="start-pve" class="mode-pve">人机挑战</button>
            </div>
        </div>
        
        <div id="game-over">
            <h1 id="winner-text" style="font-size: 56px; color: #ffcc00; margin-bottom: 10px;"></h1>
            <div id="final-score" style="color: white; font-size: 32px; margin-bottom: 30px;"></div>
            <div class="btn-group">
                <button id="restart-button">再来一局</button>
                <button id="home-button" style="background: linear-gradient(135deg, #FF9800, #F57C00);">返回主页</button>
            </div>
        </div>
    </div>

    <script>
        // --- DOM 元素 ---
        const player1 = document.getElementById('player1');
        const player2 = document.getElementById('player2');
        const ball = document.getElementById('ball');
        const table = document.getElementById('table');
        const scoreDisplay = document.getElementById('score');
        const statusMsg = document.getElementById('status-msg');
        const serveMsg = document.getElementById('serve-msg');
        const p2Controls = document.getElementById('p2-controls');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        const winnerText = document.getElementById('winner-text');
        const finalScoreText = document.getElementById('final-score');
        
        // 头像选择相关元素
        const avatarOptions = document.querySelectorAll('.avatar-option');
        
        // --- 游戏变量 ---
        let gameActive = false;
        let isVsComputer = false; 
        let player1Score = 0;
        let player2Score = 0;
        let player1Games = 0;
        let player2Games = 0;
        let resetTimeoutId = null; 
        let hitCount = 0; 
        let isServing = false; 
        let canServe = false; // 新增：是否允许发球（位置是否正确）
        
        // 物理变量
        let ballX = 0, ballY = 0;
        let ballSpeedX = 0, ballSpeedY = 0;
        
        let p1X = 0, p1Y = 0;
        let p2X = 0, p2Y = 0;
        
        let servingPlayer = 1;
        let serveCount = 1; // 每个玩家连续发球的次数
        let lastHitter = 0;
        let isRoundOver = false;

        // 音频系统
        let audioContext = null;
        let hitSound = null; 
        
        // 头像选择相关变量
        let selectedAvatar1 = '学生头像1.jpg'; // 默认头像
        let selectedAvatar2 = '国乒头像1.jpg'; // 默认头像
        
        // 常量
        const PLAYER_SPEED = 10;
        const INITIAL_SPEED = 5; 
        const MAX_SPEED = 18;    
        
        // 边界缓存
        let tableBounds = { top: 0, bottom: 0, left: 0, right: 0, centerX: 0 };
        
        // 按键状态
        const keys = {};
        
        // 触控状态
        const touchKeys = {
            'p1-up': false,
            'p1-down': false,
            'p1-left': false,
            'p1-right': false,
            'p2-up': false,
            'p2-down': false,
            'p2-left': false,
            'p2-right': false
        };

        // --- 初始化 ---
        
        function updateDimensions() {
            const rect = table.getBoundingClientRect();
            tableBounds.top = rect.top;
            tableBounds.bottom = rect.bottom;
            tableBounds.left = rect.left;
            tableBounds.right = rect.right;
            tableBounds.centerX = rect.left + rect.width / 2;
        }
        
        window.addEventListener('resize', () => {
            updateDimensions();
            if (!gameActive) resetPlayersPositions();
        });
        updateDimensions();
        
        // --- 游戏流程 ---

        function initGame(vsComputer) {
            isVsComputer = vsComputer;
            player1Score = 0;
            player2Score = 0;
            player1Games = 0; // 重置局数
            player2Games = 0;
            servingPlayer = 1; // 游戏开始默认P1发球
            updateScoreDisplay();
            
            // 更新控制提示
            if (isVsComputer) {
                p2Controls.innerHTML = '<div style="margin-bottom:5px; color:#aaa;">国乒队</div><span class="key" style="background:#2196F3; color:white; width:60px;">AI</span>';
            } else {
                p2Controls.innerHTML = '<div style="margin-bottom:5px; color:#aaa;">国乒队</div><span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>';
            }

            gameActive = true;
            isRoundOver = false;
            resetPlayersPositions();
            resetBall();
            initAudio();
            requestAnimationFrame(gameLoop);
        }
        
        function resetPlayersPositions() {
            const centerY = window.innerHeight / 2 - 40;
            p1X = tableBounds.left - 100; 
            if (p1X < 0) p1X = 10; 
            p1Y = centerY;
            
            p2X = tableBounds.right + 20;
            if (p2X > window.innerWidth - 90) p2X = window.innerWidth - 90;
            p2Y = centerY;
            updatePlayerVisuals();
        }
        
        function resetBall() {
            ball.style.display = 'block';
            statusMsg.classList.remove('show'); 
            isRoundOver = false; 
            hitCount = 0; 
            isServing = true; 
            
            serveMsg.classList.add('show'); 
            
            updateBallToPaddle(); 
            updateBallVisuals();
            checkServePosition(); // 初始化时立即检查一次
        }

        function updateBallToPaddle() {
            if (servingPlayer === 1) {
                ballX = p1X + 85; 
                ballY = p1Y + 30;
                lastHitter = 1; 
            } else {
                ballX = p2X - 25; 
                ballY = p2Y + 30;
                lastHitter = 2; 
            }
        }

        // 新增：检查发球位置是否合法
        function checkServePosition() {
            let isValid = false;
            let warningText = "";
            
            // 检测逻辑：玩家必须在垂直方向上与球台有一定的重叠
            // 避免玩家跑到屏幕最上方或最下方发球
            const tTop = tableBounds.top;
            const tBottom = tableBounds.bottom;
            
            if (servingPlayer === 1) {
                // P1 检查
                // 允许一定的宽容度，只要玩家大部分身体在球台垂直范围内即可
                if (p1Y + 60 > tTop && p1Y + 20 < tBottom) {
                     isValid = true;
                } else {
                     warningText = "请回到球台左侧";
                }
            } else {
                // P2 检查
                if (p2Y + 60 > tTop && p2Y + 20 < tBottom) {
                     isValid = true;
                } else {
                     warningText = "请回到球台右侧";
                }
            }
            
            if (isValid) {
                serveMsg.textContent = "按 空格键 发球";
                serveMsg.style.color = "#ffff00"; // 黄色
                canServe = true;
            } else {
                serveMsg.textContent = warningText;
                serveMsg.style.color = "#ff3333"; // 红色警告
                canServe = false;
            }
        }

        function launchBall() {
            if (!canServe) return; // 如果位置不正确，禁止发球

            isServing = false;
            serveMsg.classList.remove('show');
            
            if (servingPlayer === 1) {
                ballSpeedX = INITIAL_SPEED;
            } else {
                ballSpeedX = -INITIAL_SPEED;
            }
            ballSpeedY = (Math.random() * 2 - 1); 
        }
        
        function handleScore(winner) {
            if (winner === 1) player1Score++;
            else player2Score++;

            updateScoreDisplay();
            playScoreSound(); // 播放得分音效
            checkGameOver();

            if (gameActive) {
                // 连续发球2次后交换发球权
                if (serveCount < 2) {
                    // 保持当前发球权，发球次数+1
                    serveCount++;
                } else {
                    // 交换发球权，重置发球次数
                    servingPlayer = (servingPlayer === 1 ? 2 : 1);
                    serveCount = 1;
                }

                if (resetTimeoutId) clearTimeout(resetTimeoutId);
                resetTimeoutId = setTimeout(() => {
                    if(gameActive) resetBall();
                }, 800);
            }
        }
        
        function showOutMsg(winner) {
            let msg = "";
            if (winner === 1) {
                msg = "八中队+1分";
            } else {
                msg = isVsComputer ? "AI+1分" : "国乒队+1分";
            }
            statusMsg.textContent = msg;
            statusMsg.classList.add('show');
        }

        function checkGameOver() {
            // 5分一局
            const isGameWin = (player1Score >= 5 || player2Score >= 5) && Math.abs(player1Score - player2Score) >= 2;

            if (isGameWin) {
                // 记录局数
                if (player1Score > player2Score) {
                    player1Games++;
                } else {
                    player2Games++;
                }

                // 检查是否3局2胜
                if (player1Games >= 2 || player2Games >= 2) {
                    // 整个比赛结束
                    gameActive = false;
                    serveMsg.classList.remove('show');

                    if (player1Games > player2Games) {
                        winnerText.textContent = '八中队 获胜!';
                        winnerText.style.color = '#4CAF50';
                    } else {
                        winnerText.textContent = isVsComputer ? 'AI获胜!' : '国乒队 获胜!';
                        winnerText.style.color = '#2196F3';
                    }

                    finalScoreText.textContent = `${player1Games}-${player2Games} (最后比分: ${player1Score}-${player2Score})`;
                    gameOverScreen.style.display = 'flex';
                } else {
                    // 下一局
                    player1Score = 0;
                    player2Score = 0;
                    servingPlayer = 1; // 每局重新开始，P1先发球
                    serveCount = 1;
                    updateScoreDisplay();

                    if (resetTimeoutId) clearTimeout(resetTimeoutId);
                    resetTimeoutId = setTimeout(() => {
                        if (gameActive) resetBall();
                    }, 1500);
                }
            }
        }

        // --- 音频系统 ---

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (!hitSound) {
                hitSound = new Audio('pingpong.mp3');
                hitSound.volume = 0.5;
            }
        }

        function playHitSound() {
            if (!hitSound) return;

            // 重置音频到开头并播放
            hitSound.currentTime = 0;
            hitSound.play();
        }

        function playScoreSound() {
            if (!audioContext) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1); // E5
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2); // G5

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        

        // --- 核心循环 ---
        
        function gameLoop() {
            if (!gameActive) return;
            
            handlePlayerMovement();
            
            if (isServing) {
                // 发球阶段：实时更新球的位置和检查玩家站位
                checkServePosition();
                updateBallToPaddle();
                updateBallVisuals();
            } else if (!isRoundOver) {
                ballX += ballSpeedX;
                ballY += ballSpeedY;
                updateBallVisuals();
                
                // A. 上下出界
                const ballCenterY = ballY + 10;
                if (ballCenterY < tableBounds.top || ballCenterY > tableBounds.bottom) {
                    isRoundOver = true; 
                    
                    const centerX = window.innerWidth / 2;
                    let winner = (ballX < centerX) ? 2 : 1;
                    showOutMsg(winner);
                    handleScore(winner);
                }
                
                // B. 左右得分
                if (!isRoundOver) {
                    if (ballX < -20) {
                        showOutMsg(2); 
                        isRoundOver = true;
                        handleScore(2);
                    } else if (ballX > window.innerWidth) {
                        showOutMsg(1); 
                        isRoundOver = true;
                        handleScore(1);
                    }
                }
                
                // C. 碰撞
                if (!isRoundOver) {
                    checkPaddleCollision();
                }
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        function checkPaddleCollision() {
            const p1Rect = { left: p1X, right: p1X + 80, top: p1Y, bottom: p1Y + 80 };
            const p2Rect = { left: p2X, right: p2X + 80, top: p2Y, bottom: p2Y + 80 };
            const bRect = { left: ballX, right: ballX + 20, top: ballY, bottom: ballY + 20 };
            
            let hasHit = false;
            let targetX = 0, targetY = 0;
            
            // P1 击球
            if (bRect.left < p1Rect.right && bRect.right > p1Rect.left && 
                bRect.top < p1Rect.bottom && bRect.bottom > p1Rect.top) {
                
                if (ballSpeedX < 0) { 
                    hasHit = true;
                    lastHitter = 1;
                    targetX = p2X + 40; 
                    targetY = p2Y + 40;
                    
                    player1.style.transform = 'scale(1.1)';
                    setTimeout(() => player1.style.transform = 'scale(1)', 100);
                }
            }
            
            // P2 击球
            if (bRect.left < p2Rect.right && bRect.right > p2Rect.left && 
                bRect.top < p2Rect.bottom && bRect.bottom > p2Rect.top) {
                
                if (ballSpeedX > 0) { 
                    hasHit = true;
                    lastHitter = 2;
                    targetX = p1X + 40;
                    targetY = p1Y + 40;
                    
                    player2.style.transform = 'scale(1.1)';
                    setTimeout(() => player2.style.transform = 'scale(1)', 100);
                }
            }
            
            if (hasHit) {
                hitCount++;
                playHitSound(); // 播放击球音效

                let dx = targetX - ballX;
                let dy = targetY - ballY;
                let angle = Math.atan2(dy, dx);
                
                let maxNoise = Math.min(0.1 + hitCount * 0.05, 0.6);
                let noise = (Math.random() - 0.5) * 2 * maxNoise;
                
                angle += noise;
                
                let currentSpeed = Math.hypot(ballSpeedX, ballSpeedY);
                let newSpeed = Math.min(currentSpeed + 1.2, MAX_SPEED);
                
                ballSpeedX = Math.cos(angle) * newSpeed;
                ballSpeedY = Math.sin(angle) * newSpeed;
                
                if (lastHitter === 1 && ballSpeedX < 0) ballSpeedX = -ballSpeedX;
                if (lastHitter === 2 && ballSpeedX > 0) ballSpeedX = -ballSpeedX;
                
                if (Math.abs(ballSpeedX) < 3) {
                     ballSpeedX = (ballSpeedX > 0 ? 3 : -3);
                }
            }
        }
        
        function isCollidingWithTable(x, y) {
            const pLeft = x;
            const pRight = x + 80;
            const pTop = y;
            const pBottom = y + 80;
            return (
                pLeft < tableBounds.right &&
                pRight > tableBounds.left &&
                pTop < tableBounds.bottom &&
                pBottom > tableBounds.top
            );
        }
        
        function getComputerMovement() {
            const centerY = window.innerHeight / 2 - 40;
            const ballCenterY = ballY + 10;
            const p2CenterY = p2Y + 40;
            
            let targetY = centerY;
            if (ballSpeedX > 0) {
                targetY = ballCenterY - 40; 
            }
            
            let targetX = tableBounds.right + 20; 
            if (ballSpeedX > 0 && ballX > window.innerWidth / 2) {
                targetX = tableBounds.right + 10;
            }

            let moveX = 0;
            let moveY = 0;

            if (Math.abs(p2CenterY - (targetY + 40)) > 10) { 
                if (p2Y < targetY) moveY = PLAYER_SPEED; 
                else if (p2Y > targetY) moveY = -PLAYER_SPEED;
            }
            
            if (Math.abs(p2X - targetX) > 10) {
                if (p2X < targetX) moveX = PLAYER_SPEED;
                else if (p2X > targetX) moveX = -PLAYER_SPEED;
            }
            
            return { moveX, moveY };
        }

        function handlePlayerMovement() {
            // P1 (WASD + 触控)
            let nextP1X = p1X;
            if (keys['a'] || touchKeys['p1-left']) nextP1X -= PLAYER_SPEED;
            if (keys['d'] || touchKeys['p1-right']) nextP1X += PLAYER_SPEED;
            
            const p1MaxX = tableBounds.centerX - 80 - 5; 
            nextP1X = Math.max(0, Math.min(nextP1X, p1MaxX));
            
            if (!isCollidingWithTable(nextP1X, p1Y)) p1X = nextP1X;

            let nextP1Y = p1Y;
            if (keys['w'] || touchKeys['p1-up']) nextP1Y -= PLAYER_SPEED;
            if (keys['s'] || touchKeys['p1-down']) nextP1Y += PLAYER_SPEED;
            nextP1Y = Math.max(0, Math.min(nextP1Y, window.innerHeight - 80));
            if (!isCollidingWithTable(p1X, nextP1Y)) p1Y = nextP1Y;
            
            // P2 (Arrows/AI + 触控)
            let moveX = 0, moveY = 0;

            if (isVsComputer && !isRoundOver) {
                const aiMove = getComputerMovement();
                moveX = aiMove.moveX;
                moveY = aiMove.moveY;
            } else {
                if (keys['ArrowLeft'] || touchKeys['p2-left']) moveX = -PLAYER_SPEED;
                if (keys['ArrowRight'] || touchKeys['p2-right']) moveX = PLAYER_SPEED;
                if (keys['ArrowUp'] || touchKeys['p2-up']) moveY = -PLAYER_SPEED;
                if (keys['ArrowDown'] || touchKeys['p2-down']) moveY = PLAYER_SPEED;
            }

            let nextP2X = p2X + moveX;
            const p2MinX = tableBounds.centerX + 5; 
            nextP2X = Math.max(p2MinX, Math.min(nextP2X, window.innerWidth - 80));
            
            if (!isCollidingWithTable(nextP2X, p2Y)) p2X = nextP2X;

            let nextP2Y = p2Y + moveY;
            nextP2Y = Math.max(0, Math.min(nextP2Y, window.innerHeight - 80));
            if (!isCollidingWithTable(p2X, nextP2Y)) p2Y = nextP2Y;
            
            updatePlayerVisuals();
        }

        function updatePlayerVisuals() {
            player1.style.left = p1X + 'px';
            player1.style.top = p1Y + 'px';
            player2.style.left = p2X + 'px';
            player2.style.top = p2Y + 'px';
        }

        function updateBallVisuals() {
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }

        function updateScoreDisplay() {
            scoreDisplay.innerHTML = `
                <span class="score-label">局数:</span>
                <span class="games">
                    <span class="score-p1">${player1Games}</span>
                    <span class="score-separator">-</span>
                    <span class="score-p2">${player2Games}</span>
                </span>
                <span class="score-separator"> | </span>
                <span class="score-label">比分:</span>
                <span class="points">
                    <span class="score-p1">${player1Score}</span>
                    <span class="score-separator">-</span>
                    <span class="score-p2">${player2Score}</span>
                </span>
            `;
        }
        
        // 头像选择功能
        function selectAvatar(player, avatarPath) {
            // 移除该玩家所有头像的选中状态
            document.querySelectorAll(`.avatar-option[data-player="${player}"]`).forEach(option => {
                option.classList.remove('selected');
            });
            
            // 添加选中状态到当前选择的头像
            const selectedOption = document.querySelector(`.avatar-option[data-player="${player}"][data-avatar="${avatarPath}"]`);
            if (selectedOption) {
                selectedOption.classList.add('selected');
            }
            
            // 更新选中的头像变量
            if (player === '1') {
                selectedAvatar1 = avatarPath;
            } else {
                selectedAvatar2 = avatarPath;
            }
            
            // 更新玩家头像
            if (player === '1') {
                player1.style.backgroundImage = `url('${avatarPath}')`;
            } else {
                player2.style.backgroundImage = `url('${avatarPath}')`;
            }
        }
        
        // 初始化头像选择
        function initAvatarSelection() {
            // 为所有头像选项添加点击事件
            avatarOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const player = option.getAttribute('data-player');
                    const avatarPath = option.getAttribute('data-avatar');
                    selectAvatar(player, avatarPath);
                });
            });
            
            // 设置默认选中状态
            selectAvatar('1', selectedAvatar1);
            selectAvatar('2', selectedAvatar2);
        }
        
        // 更新玩家头像
        function updatePlayerAvatars() {
            player1.style.backgroundImage = `url('${selectedAvatar1}')`;
            player2.style.backgroundImage = `url('${selectedAvatar2}')`;
        }
        
        window.addEventListener('keydown', (e) => {
            if(gameActive) {
                keys[e.key] = true;
                if (e.code === 'Space' && isServing) {
                    launchBall();
                }
            }
        });
        window.addEventListener('keyup', (e) => keys[e.key] = false);
        
        // 触控事件监听器
        function setupTouchControls() {
            // 方向按钮触控事件
            const touchButtons = document.querySelectorAll('.touch-button[data-action]');
            touchButtons.forEach(button => {
                // 鼠标事件（用于桌面测试）
                button.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    const action = button.getAttribute('data-action');
                    if (action === 'p1-stop') {
                        // 停止所有P1方向
                        touchKeys['p1-up'] = false;
                        touchKeys['p1-down'] = false;
                        touchKeys['p1-left'] = false;
                        touchKeys['p1-right'] = false;
                    } else if (action === 'p2-stop') {
                        // 停止所有P2方向
                        touchKeys['p2-up'] = false;
                        touchKeys['p2-down'] = false;
                        touchKeys['p2-left'] = false;
                        touchKeys['p2-right'] = false;
                    } else {
                        touchKeys[action] = true;
                    }
                });
                
                button.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    const action = button.getAttribute('data-action');
                    if (action !== 'p1-stop' && action !== 'p2-stop') {
                        touchKeys[action] = false;
                    }
                });
                
                button.addEventListener('mouseleave', (e) => {
                    e.preventDefault();
                    const action = button.getAttribute('data-action');
                    if (action !== 'p1-stop' && action !== 'p2-stop') {
                        touchKeys[action] = false;
                    }
                });
                
                // 触摸事件（用于移动设备）
                button.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const action = button.getAttribute('data-action');
                    if (action === 'p1-stop') {
                        // 停止所有P1方向
                        touchKeys['p1-up'] = false;
                        touchKeys['p1-down'] = false;
                        touchKeys['p1-left'] = false;
                        touchKeys['p1-right'] = false;
                    } else if (action === 'p2-stop') {
                        // 停止所有P2方向
                        touchKeys['p2-up'] = false;
                        touchKeys['p2-down'] = false;
                        touchKeys['p2-left'] = false;
                        touchKeys['p2-right'] = false;
                    } else {
                        touchKeys[action] = true;
                    }
                });
                
                button.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const action = button.getAttribute('data-action');
                    if (action !== 'p1-stop' && action !== 'p2-stop') {
                        touchKeys[action] = false;
                    }
                });
                
                button.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    const action = button.getAttribute('data-action');
                    if (action !== 'p1-stop' && action !== 'p2-stop') {
                        touchKeys[action] = false;
                    }
                });
            });
            
            // 发球按钮触控事件
            const serveButton = document.getElementById('serve-touch-button');
            
            function handleServeTouch() {
                if (gameActive && isServing) {
                    launchBall();
                }
            }
            
            // 鼠标事件
            serveButton.addEventListener('mousedown', (e) => {
                e.preventDefault();
                handleServeTouch();
            });
            
            // 触摸事件
            serveButton.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleServeTouch();
            });
            
            // 更新发球按钮状态
            function updateServeButton() {
                if (gameActive && isServing) {
                    serveButton.textContent = '点击发球';
                    serveButton.classList.add('active');
                } else {
                    serveButton.textContent = '等待发球';
                    serveButton.classList.remove('active');
                }
            }
            
            // 监听游戏状态变化
            setInterval(updateServeButton, 100);
        }
        
        // 初始化触控控制
        setupTouchControls();
        
        document.getElementById('start-pvp').addEventListener('click', () => {
            startScreen.style.display = 'none';
            updatePlayerAvatars(); // 确保使用选中的头像
            initGame(false);
        });

        document.getElementById('start-pve').addEventListener('click', () => {
            startScreen.style.display = 'none';
            updatePlayerAvatars(); // 确保使用选中的头像
            initGame(true);
        });
        
        document.getElementById('restart-button').addEventListener('click', () => {
            gameOverScreen.style.display = 'none';
            initGame(isVsComputer);
        });

        document.getElementById('home-button').addEventListener('click', () => {
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'flex';
            gameActive = false;
        });
        
        // 页面加载完成后初始化头像选择
        window.addEventListener('DOMContentLoaded', () => {
            initAvatarSelection();
        });
    </script>
</body>
</html>
